spring.application.name=cafeshop
spring.profiles.active=${SPRING_PROFILES_ACTIVE:neon}

server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Email notifications (set enabled=true and configure SMTP for production)
app.notifications.email.enabled=false
app.notifications.email.from=orders@lyhourcoffee.com
spring.mail.host=localhost
spring.mail.port=1025

# SMS notifications (logs only until Twilio credentials are configured)
app.notifications.sms.enabled=false

# JWT for mobile API — set APP_JWT_SECRET on Render
app.jwt.secret=${APP_JWT_SECRET:LyhourCoffeeDevSecretKeyChangeMeInProduction2026!!}
app.jwt.expiration-ms=86400000

# CORS — set APP_CORS_ALLOWED_ORIGINS to your Render URL in production
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# Stripe — configure keys and URLs in Render environment variables
app.stripe.enabled=${APP_STRIPE_ENABLED:false}
app.stripe.secret-key=${APP_STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${APP_STRIPE_WEBHOOK_SECRET:}
app.stripe.success-url=${APP_STRIPE_SUCCESS_URL:http://localhost:8080/order/success?session_id={CHECKOUT_SESSION_ID}}
app.stripe.cancel-url=${APP_STRIPE_CANCEL_URL:http://localhost:8080/cart?cancelled=true}
