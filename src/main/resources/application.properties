spring.application.name=cafeshop
spring.profiles.active=neon

# Shared settings (profile-specific DB config in application-neon.properties / application-h2.properties)

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Email notifications (set enabled=true and configure SMTP for production)
app.notifications.email.enabled=false
app.notifications.email.from=orders@lyhourcoffee.com
spring.mail.host=localhost
spring.mail.port=1025

# SMS notifications (logs only until Twilio credentials are configured)
app.notifications.sms.enabled=false

# JWT for mobile API (change secret in production)
app.jwt.secret=LyhourCoffeeDevSecretKeyChangeMeInProduction2026!!
app.jwt.expiration-ms=86400000

# CORS for mobile clients
app.cors.allowed-origins=*

# Stripe payments (test keys from https://dashboard.stripe.com/test/apikeys)
app.stripe.enabled=false
app.stripe.secret-key=
app.stripe.webhook-secret=
app.stripe.success-url=http://localhost:8080/order/success?session_id={CHECKOUT_SESSION_ID}
app.stripe.cancel-url=http://localhost:8080/cart?cancelled=true
