spring.application.name=cafeshop
spring.profiles.active=${SPRING_PROFILES_ACTIVE:neon}
spring.config.import=optional:file:./.env,optional:file:./application-local.properties

server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Email notifications (set enabled=true and configure SMTP for production)
app.notifications.email.enabled=false
app.notifications.email.from=orders@lyhourcoffee.com
spring.mail.host=localhost
spring.mail.port=1025

# SMS notifications (logs only until Twilio credentials are configured)
app.notifications.sms.enabled=false

# JWT for mobile API — set APP_JWT_SECRET on Render
app.jwt.secret=${APP_JWT_SECRET:LyhourCoffeeDevSecretKeyChangeMeInProduction2026!!}
app.jwt.expiration-ms=86400000

# CORS — set APP_CORS_ALLOWED_ORIGINS to your Render URL in production
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# Stripe — configure keys and URLs in Render environment variables
app.stripe.enabled=${APP_STRIPE_ENABLED:false}
app.stripe.secret-key=${APP_STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${APP_STRIPE_WEBHOOK_SECRET:}
app.stripe.success-url=${APP_STRIPE_SUCCESS_URL:http://localhost:8080/order/success?session_id={CHECKOUT_SESSION_ID}}
app.stripe.cancel-url=${APP_STRIPE_CANCEL_URL:http://localhost:8080/cart?cancelled=true}

# Tax & loyalty
app.tax.rate=${APP_TAX_RATE:0.10}
app.loyalty.points-per-dollar=1
app.delivery.fee=${APP_DELIVERY_FEE:3.00}

# KH payments (enable when you have merchant credentials; demo mode simulates paid)
app.payments.khqr.enabled=${APP_KHQR_ENABLED:false}
app.payments.khqr.demo-mode=${APP_KHQR_DEMO_MODE:true}
app.payments.bakong.enabled=${APP_BAKONG_ENABLED:false}
app.payments.aba.enabled=${APP_ABA_ENABLED:false}
app.payments.wing.enabled=${APP_WING_ENABLED:false}

# Telegram notifications
app.notifications.telegram.enabled=${APP_TELEGRAM_ENABLED:false}
app.notifications.telegram.bot-token=${APP_TELEGRAM_BOT_TOKEN:}
app.notifications.telegram.chat-id=${APP_TELEGRAM_CHAT_ID:}

# Push notifications — FCM for mobile apps + optional staff webhook
app.notifications.push.enabled=${APP_PUSH_ENABLED:false}
app.notifications.push.webhook-url=${APP_PUSH_WEBHOOK_URL:}
app.notifications.push.fcm-server-key=${APP_FCM_SERVER_KEY:}

# Rate limiting
app.security.rate-limit.enabled=true
app.security.rate-limit.max-requests=30
app.security.rate-limit.window-seconds=60

# Auto backup (exports CSV to ./backups daily)
app.backup.enabled=${APP_BACKUP_ENABLED:true}
app.backup.directory=./backups
app.backup.cron=0 0 2 * * *
