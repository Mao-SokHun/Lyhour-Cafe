<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="auth-page">
  <div class="auth-shell" style="max-width:420px;margin:2rem auto;">
    <div class="auth-form">
      <h2>Two-factor authentication</h2>
      <p class="subtitle">Enter the 6-digit code from your authenticator app.</p>
      <div th:if="${param.error}" class="text-muted" style="color:var(--danger);margin-bottom:0.75rem;">Invalid code. Try again.</div>
      <form method="post" th:action="@{/2fa/verify}">
        <div class="form-group"><label>Code</label><input class="input" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autofocus></div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Verify</button>
      </form>
    </div>
  </div>
</body>
</html>
