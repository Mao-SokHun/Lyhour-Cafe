<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
  <div th:replace="~{fragments/guest-header :: guest-header}"></div>
  <main class="page">
    <div class="container" style="max-width:640px;">
      <h1 class="page-title">Book a table</h1>
      <p class="page-subtitle">Reserve your spot at Lyhour Coffee. We'll confirm by email.</p>

      <div th:if="${param.success}" class="card card-flat mt-2" style="background:#d8f3e5;padding:1rem;">Reservation submitted! We'll confirm shortly.</div>
      <div th:if="${error}" class="card card-flat mt-2" style="background:#fde2e2;padding:1rem;" th:text="${error}"></div>

      <div class="card mt-2">
        <form method="post" action="/reservations">
          <div class="form-group"><label>Name</label><input class="input" type="text" name="customerName" required></div>
          <div class="grid-2">
            <div class="form-group"><label>Email</label><input class="input" type="email" name="email" required></div>
            <div class="form-group"><label>Phone</label><input class="input" type="tel" name="phone"></div>
          </div>
          <div class="grid-2">
            <div class="form-group"><label>Date</label><input class="input" type="date" name="reservationDate" required></div>
            <div class="form-group"><label>Time</label><input class="input" type="time" name="reservationTime" required></div>
          </div>
          <div class="grid-2">
            <div class="form-group"><label>Guests</label><input class="input" type="number" name="guests" min="1" max="20" value="2" required></div>
            <div class="form-group"><label>Branch</label>
              <select class="select" name="branchId">
                <option th:each="b : ${branches}" th:value="${b.id}" th:text="${b.name}"></option>
              </select>
            </div>
          </div>
          <div class="form-group"><label>Notes</label><input class="input" type="text" name="note" placeholder="Window seat, birthday, etc."></div>
          <button type="submit" class="btn btn-primary btn-block">Request reservation</button>
        </form>
      </div>
    </div>
  </main>
  <div th:replace="~{fragments/footer :: footer}"></div>
  <script src="/javascript/ui.js"></script>
</body>
</html>
