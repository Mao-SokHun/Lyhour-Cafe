<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/dashboard-head :: dashboard-head}"></head>
<body class="admin-body">
<div class="admin-layout">
  <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
  <main class="admin-main">
    <button type="button" class="btn btn-outline admin-mobile-toggle" id="admin-sidebar-toggle"><i class="fa-solid fa-bars"></i> Menu</button>
    <div class="admin-topbar">
      <div><h1>Orders</h1><p class="page-subtitle">Track and update order status</p></div>
    </div>

    <div class="action-bar">
      <a href="/admin/orders" class="btn" th:classappend="${filterStatus == null} ? 'btn-primary' : 'btn-outline'">All</a>
      <a th:each="s : ${statuses}" th:href="@{/admin/orders(status=${s.name()})}" th:text="${s.name()}"
         class="btn" th:classappend="${filterStatus == s.name()} ? 'btn-primary' : 'btn-outline'"></a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Customer</th><th>Date</th><th>Source</th><th>Total</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="order : ${orders}">
            <td th:text="'#' + ${order.id}"></td>
            <td th:text="${order.username}"></td>
            <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy HH:mm')}"></td>
            <td><span class="badge" th:classappend="${order.source.name() == 'IN_SHOP'} ? 'badge-inshop' : 'badge-online'" th:text="${order.source}"></span></td>
            <td th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></td>
            <td>
              <span class="badge"
                    th:classappend="${order.status.name() == 'COMPLETED'} ? 'badge-completed' :
                                    (${order.status.name() == 'PENDING'} ? 'badge-pending' :
                                    (${order.status.name() == 'PREPARING'} ? 'badge-preparing' : 'badge-cancelled'))"
                    th:text="${order.status}"></span>
            </td>
            <td><a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-ghost btn-sm">View</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<script src="/javascript/ui.js"></script>
</body>
</html>
