<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/dashboard-head :: dashboard-head}"></head>
<body class="admin-body">
<div class="admin-layout">
  <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
  <main class="admin-main">
    <div class="admin-topbar"><div><h1>Promotions</h1></div></div>
    <div class="card mb-3">
      <form th:action="@{/admin/promotions/save}" th:object="${promotion}" method="post" class="grid-2">
        <div class="form-group"><label>Name</label><input class="input" th:field="*{name}" required></div>
        <div class="form-group"><label>Type</label><select class="select" th:field="*{type}"><option value="HAPPY_HOUR">Happy Hour</option><option value="BOGO">BOGO</option><option value="COMBO">Combo</option><option value="SEASONAL">Seasonal</option></select></div>
        <div class="form-group"><label>Discount %</label><input class="input" type="number" th:field="*{discountPercent}"></div>
        <div class="form-group"><label>Start</label><input class="input" type="time" th:field="*{startTime}"></div>
        <div class="form-group"><label>End</label><input class="input" type="time" th:field="*{endTime}"></div>
        <button type="submit" class="btn btn-primary">Save</button>
      </form>
    </div>
    <div class="table-wrap"><table><thead><tr><th>Name</th><th>Type</th><th>%</th><th>Hours</th><th>Active</th></tr></thead>
    <tbody><tr th:each="p : ${promotions}"><td th:text="${p.name}"></td><td th:text="${p.type}"></td><td th:text="${p.discountPercent}"></td>
    <td><span th:text="${p.startTime}"></span>–<span th:text="${p.endTime}"></span></td><td th:text="${p.active}"></td></tr></tbody></table></div>
  </main>
</div>
</body>
</html>
