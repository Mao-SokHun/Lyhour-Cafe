<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="auth-page">
  <div class="auth-shell">
    <div class="auth-brand">
      <span class="logo-mark" style="margin-bottom:1rem;"><i class="fa-solid fa-mug-hot"></i></span>
      <h1>Lyhour Coffee</h1>
      <p>Sign in to save orders, track history, and checkout faster.</p>
    </div>
    <div class="auth-form">
      <h2>Sign in</h2>
      <p class="subtitle">Welcome back to the shop.</p>
      <form method="post" th:action="@{/signin}">
        <div class="form-group">
          <label for="username">Username</label>
          <input class="input" type="text" id="username" name="username" placeholder="Your username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="input" type="password" id="password" name="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Sign in</button>
      </form>
      <p class="form-note">No account? <a href="/signup">Create one</a> · <a href="/forgot-password">Forgot password?</a></p>
    </div>
  </div>
</body>
</html>
