<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/dashboard-head :: dashboard-head}"></head>
<body class="admin-body">
<div class="admin-layout">
  <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
  <main class="admin-main">
    <button type="button" class="btn btn-outline admin-mobile-toggle" id="admin-sidebar-toggle"><i class="fa-solid fa-bars"></i> Menu</button>
    <div class="admin-topbar"><div><h1>Customers</h1><p class="page-subtitle">Registered shop accounts</p></div></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Joined</th></tr></thead>
        <tbody>
          <tr th:each="user : ${users}" th:if="${user.role == 'CUSTOMER'}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${#dates.format(user.create_at, 'yyyy-MM-dd')}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<script src="/javascript/ui.js"></script>
</body>
</html>
