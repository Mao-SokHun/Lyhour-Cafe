<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/dashboard-head :: dashboard-head}"></head>
<body class="admin-body">
<div class="admin-layout">
  <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
  <main class="admin-main">
    <button type="button" class="btn btn-outline admin-mobile-toggle" id="admin-sidebar-toggle"><i class="fa-solid fa-bars"></i> Menu</button>
    <div class="admin-topbar"><div><h1 th:text="${product.id != null} ? 'Edit product' : 'Add product'">Product</h1></div></div>

    <div class="card" style="max-width:720px;">
      <form th:action="@{/products/save}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="grid-2">
          <div class="form-group"><label>Name</label><input class="input" type="text" th:field="*{name}" required></div>
          <div class="form-group"><label>Category</label>
            <select class="select" th:field="*{category}" required>
              <option value="Coffee">Coffee</option>
              <option value="Cake">Cake</option>
              <option value="Drink">Drink</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Description</label><textarea class="textarea input" rows="3" th:field="*{description}" required></textarea></div>
        <div class="grid-2">
          <div class="form-group"><label>Price ($)</label><input class="input" type="number" step="0.01" th:field="*{price}" required></div>
          <div class="form-group"><label>Stock</label><input class="input" type="number" min="0" th:field="*{stock}" required></div>
          <div class="form-group"><label>Image URL</label><input class="input" type="url" th:field="*{imageUrl}" required></div>
        </div>
        <div class="flex gap-sm mt-3">
          <button type="submit" class="btn btn-primary">Save product</button>
          <a href="/dashboard" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
<script src="/javascript/ui.js"></script>
</body>
</html>
