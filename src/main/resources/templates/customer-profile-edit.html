<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
  <div th:replace="~{fragments/order-header :: order-header}"></div>
  <main class="page">
    <div class="container" style="max-width:560px;">
      <h1 class="page-title">Edit profile</h1>
      <div class="card mt-2">
        <form th:action="@{/customer/profile/update}" th:object="${user}" method="post">
          <div class="form-group"><label>Username</label><input class="input" type="text" th:field="*{username}" required></div>
          <div class="form-group"><label>Email</label><input class="input" type="email" th:field="*{email}" required></div>
          <div class="form-group"><label>New password</label><input class="input" type="password" th:field="*{password}" placeholder="Leave blank to keep current"></div>
          <div class="flex gap-sm mt-3">
            <button type="submit" class="btn btn-primary">Save changes</button>
            <a href="/customer/profile" class="btn btn-outline">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="/javascript/ui.js"></script>
</body>
</html>
