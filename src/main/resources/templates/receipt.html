<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/dashboard-head :: dashboard-head}"></head>
<body class="admin-body">
<div class="admin-layout">
  <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
  <main class="admin-main">
    <div class="admin-topbar flex justify-between items-center no-print">
      <div><h1>Receipt</h1><p class="page-subtitle" th:text="'Order #' + ${order.id}"></p></div>
      <div class="flex gap-sm">
        <button type="button" class="btn btn-primary" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
        <a href="/admin/pos" class="btn btn-outline">Back to POS</a>
        <a th:href="@{/admin/orders/{id}/receipt.pdf(id=${order.id})}" class="btn btn-outline"><i class="fa-solid fa-file-pdf"></i> Download PDF</a>
      </div>
    </div>

    <div class="card receipt-paper" style="max-width:420px;margin:0 auto;">
      <div style="text-align:center;margin-bottom:1rem;">
        <strong style="font-size:1.2rem;">Lyhour Coffee</strong><br>
        <span class="text-muted" style="font-size:0.85rem;">#390 Street Coffee, Phnom Penh</span>
      </div>
      <p style="font-size:0.88rem;margin:0;">
        Order #<span th:text="${order.id}"></span><br>
        <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy · HH:mm')}"></span><br>
        Customer: <span th:text="${order.username}"></span>
        <span th:if="${order.cafeTable != null}"> · Table <span th:text="${order.cafeTable.tableNumber}"></span></span>
      </p>
      <hr style="border:none;border-top:1px dashed var(--border);margin:1rem 0;">
      <div th:each="item : ${order.orderItems}" class="flex justify-between" style="font-size:0.9rem;margin-bottom:0.35rem;">
        <span>
          <span th:text="${item.quantity}"></span>× <span th:text="${item.name_product}"></span>
          <span th:if="${item.size != null}" class="text-muted" th:text="'(' + ${item.size} + ')'"></span>
        </span>
        <span th:text="'$' + ${#numbers.formatDecimal(item.priceAtTimeOfOrder * item.quantity, 1, 2)}"></span>
      </div>
      <hr style="border:none;border-top:1px dashed var(--border);margin:1rem 0;">
      <div class="flex justify-between text-muted" style="font-size:0.88rem;"><span>Subtotal</span><span th:text="'$' + ${#numbers.formatDecimal(order.subtotal, 1, 2)}"></span></div>
      <div th:if="${order.discountAmount != null and order.discountAmount > 0}" class="flex justify-between text-muted" style="font-size:0.88rem;">
        <span>Discount<span th:if="${order.couponCode != null}" th:text="' (' + ${order.couponCode} + ')'"></span></span>
        <span th:text="'-$' + ${#numbers.formatDecimal(order.discountAmount, 1, 2)}"></span>
      </div>
      <div class="flex justify-between text-muted" style="font-size:0.88rem;"><span>Tax</span><span th:text="'$' + ${#numbers.formatDecimal(order.taxAmount, 1, 2)}"></span></div>
      <div class="flex justify-between" style="font-weight:700;font-size:1.1rem;margin-top:0.5rem;">
        <span>Total</span><span th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span>
      </div>
      <p class="text-muted" style="font-size:0.82rem;margin-top:1rem;text-align:center;">
        Payment: <span th:text="${order.paymentMethod}"></span> · <span th:text="${order.paymentStatus}"></span>
      </p>
      <p style="text-align:center;font-size:0.85rem;margin-top:1.5rem;">Thank you!</p>
    </div>
  </main>
</div>
<style>
  @media print {
    .admin-sidebar, .admin-topbar, .no-print { display:none !important; }
    .admin-main { padding:0 !important; }
    .receipt-paper { box-shadow:none !important; border:none !important; }
  }
</style>
</body>
</html>
