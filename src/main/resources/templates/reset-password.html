<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/guest-header :: guest-header}"></div>
<main class="page"><div class="container" style="max-width:420px;">
  <h1 class="page-title">Reset password</h1>
  <form th:action="@{/reset-password}" method="post" class="card mt-2">
    <input type="hidden" name="token" th:value="${token}">
    <div class="form-group"><label>New password</label><input class="input" type="password" name="password" required minlength="6"></div>
    <button type="submit" class="btn btn-primary btn-block mt-2">Update password</button>
  </form>
</div></main>
</body>
</html>
