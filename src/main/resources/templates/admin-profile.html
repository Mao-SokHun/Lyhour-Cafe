<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/dashboard-head :: dashboard-head}"></head>
<body class="admin-body">
<div class="admin-layout">
  <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
  <main class="admin-main">
    <div class="admin-topbar"><h1>Admin profile</h1></div>
    <div th:if="${param.success}" class="card card-flat" style="background:#d8f3e5;margin-bottom:1rem;">Profile updated.</div>
    <div class="card" style="max-width:560px;">
      <div class="form-group"><label>Username</label><p th:text="${user.username}"></p></div>
      <div class="form-group"><label>Email</label><p th:text="${user.email}"></p></div>
      <div class="form-group"><label>Role</label><p th:text="${user.role}"></p></div>
      <a href="/admin/profile/edit" class="btn btn-primary">Edit profile</a>
    </div>
  </main>
</div>
<script src="/javascript/ui.js"></script>
</body>
</html>
