<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
  <div th:replace="~{fragments/order-header :: order-header}"></div>
  <main class="page">
    <div class="container" style="max-width:560px;">
      <div class="card text-center" style="padding:3rem 2rem;">
        <div style="width:72px;height:72px;margin:0 auto 1rem;border-radius:50%;background:#d8f3e5;color:var(--success);display:grid;place-items:center;font-size:2rem;">
          <i class="fa-solid fa-check"></i>
        </div>
        <h1 class="page-title">Order placed</h1>
        <p class="page-subtitle" th:if="${stripePaid}">Payment received via Stripe. We're preparing your drinks.</p>
        <p class="page-subtitle" th:unless="${stripePaid}">We're preparing your drinks. You'll get updates in your order history.</p>
        <a href="/index#product-menu" class="btn btn-primary mt-3">Order more</a>
        <a href="/customer/orders" class="btn btn-outline mt-2" style="margin-left:0.5rem;">View orders</a>
      </div>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('clear') === 'true' || params.get('session_id')) {
        localStorage.removeItem('cart');
      }
    });
  </script>
</body>
</html>
