<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/guest-header :: guest-header}"></div>
<main class="page"><div class="container" style="max-width:420px;">
  <h1 class="page-title">Forgot password</h1>
  <form th:action="@{/forgot-password}" method="post" class="card mt-2">
    <div class="form-group"><label>Email</label><input class="input" type="email" name="email" required></div>
    <button type="submit" class="btn btn-primary btn-block mt-2">Send reset link</button>
    <a href="/signin" class="btn btn-outline btn-block mt-1">Back to sign in</a>
  </form>
</div></main>
</body>
</html>
