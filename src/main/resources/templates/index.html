<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <section class="hero">
    <div class="container hero-grid">
      <div class="hero-copy">
        <span class="eyebrow">Welcome back</span>
        <h1>What are you having today?</h1>
        <p>Add items to your bag, customize size in the cart, and pick up when ready.</p>
        <div class="hero-actions">
          <a href="#product-menu" class="btn btn-primary">Order now</a>
          <a href="/customer/orders" class="btn btn-outline">My orders</a>
        </div>
      </div>
      <div class="hero-visual">
        <img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=900&q=80" alt="Latte art">
      </div>
    </div>
  </section>

  <div th:replace="~{fragments/product-menu :: product-menu}"></div>

  <section class="section" id="about" style="padding-top:0;">
    <div class="container info-strip">
      <div class="info-item"><strong>Small</strong><span>−$0.50</span></div>
      <div class="info-item"><strong>Medium</strong><span>Base price</span></div>
      <div class="info-item"><strong>Large</strong><span>+$1.00</span></div>
      <div class="info-item"><strong>Notes</strong><span>Special requests in cart</span></div>
    </div>
  </section>

  <div th:replace="~{fragments/footer :: footer}"></div>
  <script src="/javascript/ui.js"></script>
  <script src="/javascript/addcart.js"></script>
</body>
</html>
