<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
  <div th:replace="~{fragments/order-header :: order-header}"></div>

  <main class="page">
    <div class="container">
      <nav class="breadcrumb">
        <a href="/index">Home</a> <span>/</span> <span>Cart</span>
      </nav>
      <h1 class="page-title">Your bag</h1>
      <p class="page-subtitle">Adjust sizes and notes before checkout.</p>

      <div id="cart-view" class="cart-layout">
        <div id="cart-items" class="flex" style="flex-direction:column;gap:1rem;"></div>
        <aside class="card summary-card">
          <h3>Summary</h3>
          <div class="mt-2" style="display:grid;gap:0.5rem;">
            <div class="flex justify-between"><span>Items</span><span id="total-items">0</span></div>
            <div class="flex justify-between"><span>Subtotal</span><span id="subtotal-price">$0.00</span></div>
            <div class="flex justify-between text-muted"><span>Pickup</span><span>Free</span></div>
            <hr style="border:none;border-top:1px solid var(--border);margin:0.5rem 0;">
            <div class="flex justify-between" style="font-weight:700;font-size:1.1rem;">
              <span>Total</span><span id="total-price">$0.00</span>
            </div>
          </div>
          <div class="form-group mt-3" style="margin-bottom:0;">
            <label>Payment</label>
            <label class="flex items-center gap-sm mt-1" style="font-size:0.88rem;">
              <input type="radio" name="paymentMethod" value="PAY_AT_PICKUP" checked> Pay at pickup
            </label>
            <label class="flex items-center gap-sm mt-1" style="font-size:0.88rem;" th:if="${stripeEnabled}">
              <input type="radio" name="paymentMethod" value="STRIPE"> Pay with card (Stripe)
            </label>
            <label class="flex items-center gap-sm mt-1" style="font-size:0.88rem;" th:unless="${stripeEnabled}">
              <input type="radio" name="paymentMethod" value="ONLINE_MOCK"> Pay online (demo — enable Stripe in config)
            </label>
            <label class="flex items-center gap-sm mt-1 text-muted" style="font-size:0.88rem;opacity:0.6;cursor:not-allowed;">
              <input type="radio" name="paymentMethod" value="BAKONG" disabled> Bakong KHQR (coming soon)
            </label>
          </div>
          <button id="checkout-btn" class="btn btn-primary btn-block mt-3" disabled>Checkout</button>
        </aside>
      </div>

      <div id="empty-cart" class="empty-state hidden">
        <h2>Your bag is empty</h2>
        <p class="text-muted mt-1">Explore the menu and add something delicious.</p>
        <a href="/index#product-menu" class="btn btn-primary mt-2">Browse menu</a>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: footer}"></div>

  <script src="/javascript/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cartView = document.getElementById('cart-view');
      const cartItemsContainer = document.getElementById('cart-items');
      const emptyCartMessage = document.getElementById('empty-cart');
      const totalItemsEl = document.getElementById('total-items');
      const subtotalPriceEl = document.getElementById('subtotal-price');
      const totalPriceEl = document.getElementById('total-price');
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const sizeModifiers = { Small: -0.50, Medium: 0, Large: 1.00 };

      function updateHeaderCartCount() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.querySelectorAll('.cart-count-badge').forEach(el => {
          if (totalItems > 0) { el.textContent = totalItems; el.classList.remove('hidden'); }
          else { el.classList.add('hidden'); }
        });
      }

      function renderCart() {
        if (cart.length === 0) {
          cartView.classList.add('hidden');
          emptyCartMessage.classList.remove('hidden');
          updateHeaderCartCount();
          return;
        }
        cartView.classList.remove('hidden');
        emptyCartMessage.classList.add('hidden');
        cartItemsContainer.innerHTML = '';
        let subtotal = 0, totalItems = 0;

        cart.forEach((item, index) => {
          if (item.basePrice === undefined) item.basePrice = parseFloat(item.price);
          if (!item.size) item.size = 'Medium';
          if (!item.note) item.note = '';
          item.price = item.basePrice + (sizeModifiers[item.size] || 0);
          const itemTotal = item.price * item.quantity;
          subtotal += itemTotal;
          totalItems += item.quantity;

          const row = document.createElement('div');
          row.className = 'cart-item';
          row.innerHTML = `
            <img src="${item.imageUrl}" alt="${item.name}">
            <div>
              <h3 style="font-size:1.2rem;margin-bottom:0.25rem;">${item.name}</h3>
              <p class="text-muted" style="margin:0;font-size:0.88rem;">$${item.price.toFixed(2)} each</p>
              <button data-index="${index}" class="remove-item-btn btn btn-ghost btn-sm mt-1" type="button">Remove</button>
            </div>
            <div style="text-align:right;">
              <div class="qty-control">
                <button type="button" data-index="${index}" data-change="-1" class="update-quantity-btn">−</button>
                <span style="min-width:24px;text-align:center;">${item.quantity}</span>
                <button type="button" data-index="${index}" data-change="1" class="update-quantity-btn">+</button>
              </div>
              <div style="font-weight:700;margin-top:0.75rem;">$${itemTotal.toFixed(2)}</div>
            </div>
            <div style="grid-column:1/-1;display:grid;gap:0.75rem;grid-template-columns:1fr 2fr;">
              <div class="form-group" style="margin:0;">
                <label>Size</label>
                <select data-index="${index}" class="select size-select">
                  <option value="Small" ${item.size==='Small'?'selected':''}>Small (−$0.50)</option>
                  <option value="Medium" ${item.size==='Medium'?'selected':''}>Medium</option>
                  <option value="Large" ${item.size==='Large'?'selected':''}>Large (+$1.00)</option>
                </select>
              </div>
              <div class="form-group" style="margin:0;">
                <label>Note</label>
                <input type="text" data-index="${index}" class="input note-input" value="${item.note}" placeholder="Less sugar, extra ice…">
              </div>
            </div>`;
          cartItemsContainer.appendChild(row);
        });

        totalItemsEl.textContent = totalItems;
        subtotalPriceEl.textContent = '$' + subtotal.toFixed(2);
        totalPriceEl.textContent = '$' + subtotal.toFixed(2);
        document.getElementById('checkout-btn').disabled = false;
        updateHeaderCartCount();
      }

      function saveAndRender() { localStorage.setItem('cart', JSON.stringify(cart)); renderCart(); }

      cartItemsContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const index = parseInt(btn.dataset.index, 10);
        if (btn.classList.contains('remove-item-btn')) { cart.splice(index, 1); saveAndRender(); }
        if (btn.classList.contains('update-quantity-btn')) {
          cart[index].quantity += parseInt(btn.dataset.change, 10);
          if (cart[index].quantity < 1) cart.splice(index, 1);
          saveAndRender();
        }
      });

      cartItemsContainer.addEventListener('change', (e) => {
        const el = e.target;
        const index = parseInt(el.dataset.index, 10);
        if (!cart[index]) return;
        if (el.classList.contains('size-select')) cart[index].size = el.value;
        if (el.classList.contains('note-input')) cart[index].note = el.value;
        saveAndRender();
      });

      document.getElementById('checkout-btn').addEventListener('click', async () => {
        const checkoutBtn = document.getElementById('checkout-btn');
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = 'Processing…';
        const payload = {
          items: cart.map(item => ({
            productId: parseInt(item.id, 10),
            quantity: item.quantity,
            size: item.size,
            note: item.note,
            price: item.price
          })),
          paymentMethod: document.querySelector('input[name="paymentMethod"]:checked')?.value || 'PAY_AT_PICKUP'
        };
        try {
          const response = await fetch('/order/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (response.ok) {
            localStorage.removeItem('cart');
            window.location.href = result.redirectUrl;
          } else if (response.status === 401) {
            window.location.href = result.redirectUrl;
          } else {
            alert(result.message || 'Checkout failed');
            checkoutBtn.disabled = false;
            checkoutBtn.textContent = 'Checkout';
          }
        } catch (err) {
          alert(err.message);
          checkoutBtn.disabled = false;
          checkoutBtn.textContent = 'Checkout';
        }
      });

      renderCart();
    });
  </script>
</body>
</html>
