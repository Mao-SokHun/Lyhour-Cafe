<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/dashboard-head :: dashboard-head}"></head>
<body class="admin-body">
<div class="admin-layout">
  <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
  <main class="admin-main">
    <div class="admin-topbar"><div><h1>Accounting</h1></div></div>
    <div class="stat-grid mb-3">
      <div class="stat-card accent"><div class="label">Month revenue</div><div class="value" th:text="'$' + ${#numbers.formatDecimal(monthRevenue,1,2)}"></div></div>
      <div class="stat-card"><div class="label">Month expenses</div><div class="value" th:text="'$' + ${#numbers.formatDecimal(monthExpenses,1,2)}"></div></div>
      <div class="stat-card"><div class="label">Month profit</div><div class="value" th:text="'$' + ${#numbers.formatDecimal(monthProfit,1,2)}"></div></div>
    </div>
    <div class="card mb-3">
      <form th:action="@{/admin/accounting/expense/save}" th:object="${expense}" method="post" class="grid-2">
        <div class="form-group"><label>Description</label><input class="input" th:field="*{description}" required></div>
        <div class="form-group"><label>Category</label><select class="select" th:field="*{category}"><option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option></select></div>
        <div class="form-group"><label>Amount</label><input class="input" type="number" step="0.01" th:field="*{amount}" required></div>
        <button type="submit" class="btn btn-primary">Add expense</button>
      </form>
    </div>
    <div class="table-wrap"><table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th></tr></thead>
    <tbody><tr th:each="e : ${expenses}"><td th:text="${e.expenseDate}"></td><td th:text="${e.description}"></td><td th:text="${e.category}"></td><td th:text="'$' + ${e.amount}"></td></tr></tbody></table></div>
  </main>
</div>
</body>
</html>
