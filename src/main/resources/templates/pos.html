<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/dashboard-head :: dashboard-head}"></head>
<body class="admin-body">
<div class="admin-layout">
  <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
  <main class="admin-main">
    <button type="button" class="btn btn-outline admin-mobile-toggle" id="admin-sidebar-toggle"><i class="fa-solid fa-bars"></i> Menu</button>
    <div class="admin-topbar flex justify-between items-center flex-wrap gap-sm">
      <div><h1>Point of Sale</h1><p class="page-subtitle">In-shop counter orders</p></div>
      <div class="flex gap-sm flex-wrap">
        <div class="form-group" style="margin:0;min-width:140px;">
          <label>Search</label>
          <input type="text" id="pos-search" class="input" placeholder="Product name…">
        </div>
        <div class="form-group" style="margin:0;min-width:140px;">
          <label>Barcode</label>
          <input type="text" id="pos-barcode" class="input" placeholder="Scan barcode…">
        </div>
      <div class="form-group" style="margin:0;min-width:160px;">
        <label>Customer</label>
        <select id="customer-select" class="select">
          <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.username}" th:selected="${c.username == 'walkin'}"></option>
        </select>
      </div>
      <div class="form-group" style="margin:0;min-width:140px;">
        <label>Table</label>
        <select id="table-select" class="select">
          <option value="">— None —</option>
          <option th:each="t : ${tables}" th:value="${t.id}" th:text="${t.tableNumber + ' (' + t.status + ')'}" th:disabled="${t.status.name() != 'AVAILABLE'}"></option>
        </select>
      </div>
      </div>
    </div>

    <div class="pos-layout">
      <div>
        <h3 style="margin-bottom:0.75rem;">Coffee</h3>
        <div class="pos-product-grid">
          <button type="button" class="pos-product pos-product-btn" th:each="product : ${products}" th:if="${product.category == 'Coffee'}"
                  th:data-id="${product.id}" th:data-name="${product.name}" th:data-price="${product.price}">
            <img th:src="${product.imageUrl}" alt="">
            <strong th:text="${product.name}"></strong>
            <span class="price" style="font-size:0.95rem;" th:text="'$' + ${product.price}"></span>
          </button>
        </div>
        <h3 style="margin:1.5rem 0 0.75rem;">Cake</h3>
        <div class="pos-product-grid">
          <button type="button" class="pos-product pos-product-btn" th:each="product : ${products}" th:if="${product.category == 'Cake'}"
                  th:data-id="${product.id}" th:data-name="${product.name}" th:data-price="${product.price}">
            <img th:src="${product.imageUrl}" alt="">
            <strong th:text="${product.name}"></strong>
            <span class="price" style="font-size:0.95rem;" th:text="'$' + ${product.price}"></span>
          </button>
        </div>
        <h3 style="margin:1.5rem 0 0.75rem;">Drinks</h3>
        <div class="pos-product-grid">
          <button type="button" class="pos-product pos-product-btn" th:each="product : ${products}" th:if="${product.category == 'Drink'}"
                  th:data-id="${product.id}" th:data-name="${product.name}" th:data-price="${product.price}">
            <img th:src="${product.imageUrl}" alt="">
            <strong th:text="${product.name}"></strong>
            <span class="price" style="font-size:0.95rem;" th:text="'$' + ${product.price}"></span>
          </button>
        </div>
      </div>

      <aside class="card pos-cart">
        <h3>Current sale</h3>
        <div id="pos-empty" class="text-muted mt-2">Tap products to add</div>
        <div id="pos-cart-items"></div>
        <div class="form-group mt-2" style="margin-bottom:0;">
          <label>Coupon</label>
          <input type="text" id="pos-coupon" class="input" placeholder="WELCOME10" style="text-transform:uppercase;">
        </div>
        <div class="mt-2 flex justify-between text-muted" style="font-size:0.88rem;"><span>Subtotal</span><span id="pos-subtotal">$0.00</span></div>
        <div class="flex justify-between text-muted" style="font-size:0.88rem;"><span>Tax (10%)</span><span id="pos-tax">$0.00</span></div>
        <div class="mt-1 flex justify-between" style="font-weight:700;font-size:1.15rem;">
          <span>Total</span><span id="pos-total">$0.00</span>
        </div>
        <button type="button" id="pos-clear" class="btn btn-outline btn-block mt-2">Clear</button>
        <button type="button" id="pos-checkout" class="btn btn-primary btn-block mt-1" disabled>Complete sale</button>
      </aside>
    </div>
  </main>
</div>
<script src="/javascript/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  let cart = [];
  const sizeModifiers = { Small: -0.50, Medium: 0, Large: 1.00 };
  const cartEl = document.getElementById('pos-cart-items');
  const emptyEl = document.getElementById('pos-empty');
  const totalEl = document.getElementById('pos-total');
  const subtotalEl = document.getElementById('pos-subtotal');
  const taxEl = document.getElementById('pos-tax');
  const checkoutBtn = document.getElementById('pos-checkout');
  const TAX_RATE = 0.10;

  function render() {
    cartEl.innerHTML = '';
    if (!cart.length) {
      emptyEl.classList.remove('hidden');
      checkoutBtn.disabled = true;
      totalEl.textContent = '$0.00';
      subtotalEl.textContent = '$0.00';
      taxEl.textContent = '$0.00';
      return;
    }
    emptyEl.classList.add('hidden');
    checkoutBtn.disabled = false;
    let subtotal = 0;
    cart.forEach((item, index) => {
      const mod = sizeModifiers[item.size] || 0;
      item.price = item.basePrice + mod;
      const line = item.price * item.quantity;
      subtotal += line;
      const div = document.createElement('div');
      div.className = 'pos-cart-item';
      div.innerHTML = `<div class="flex justify-between"><strong>${item.name}</strong><span>$${line.toFixed(2)}</span></div>
        <div class="flex gap-sm mt-1"><select data-i="${index}" class="select pos-size" style="padding:0.35rem;font-size:0.8rem;">
          <option ${item.size==='Small'?'selected':''}>Small</option><option ${item.size==='Medium'?'selected':''}>Medium</option><option ${item.size==='Large'?'selected':''}>Large</option></select>
          <button type="button" data-i="${index}" class="btn btn-ghost btn-sm pos-minus">−</button><span>${item.quantity}</span><button type="button" data-i="${index}" class="btn btn-ghost btn-sm pos-plus">+</button>
          <button type="button" data-i="${index}" class="btn btn-ghost btn-sm pos-remove" style="margin-left:auto;color:var(--danger);">×</button></div>`;
      cartEl.appendChild(div);
    });
    const tax = subtotal * TAX_RATE;
    subtotalEl.textContent = '$' + subtotal.toFixed(2);
    taxEl.textContent = '$' + tax.toFixed(2);
    totalEl.textContent = '$' + (subtotal + tax).toFixed(2);
  }

  document.querySelectorAll('.pos-product-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const existing = cart.find(i => i.id === id && i.size === 'Medium');
      if (existing) existing.quantity += 1;
      else cart.push({ id, name: btn.dataset.name, basePrice: parseFloat(btn.dataset.price), price: parseFloat(btn.dataset.price), quantity: 1, size: 'Medium', note: '' });
      render();
    });
  });

  cartEl.addEventListener('click', e => {
    const i = parseInt(e.target.dataset.i, 10);
    if (e.target.classList.contains('pos-plus')) { cart[i].quantity++; render(); }
    if (e.target.classList.contains('pos-minus')) { cart[i].quantity--; if (cart[i].quantity <= 0) cart.splice(i, 1); render(); }
    if (e.target.classList.contains('pos-remove')) { cart.splice(i, 1); render(); }
  });
  cartEl.addEventListener('change', e => {
    if (e.target.classList.contains('pos-size')) {
      cart[parseInt(e.target.dataset.i, 10)].size = e.target.value;
      render();
    }
  });
  document.getElementById('pos-clear').addEventListener('click', () => { cart = []; render(); });
  document.getElementById('pos-search')?.addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.pos-product-btn').forEach(btn => {
      btn.style.display = btn.dataset.name.toLowerCase().includes(q) ? '' : 'none';
    });
  });
  document.getElementById('pos-barcode')?.addEventListener('keydown', async e => {
    if (e.key !== 'Enter') return;
    const code = e.target.value.trim();
    if (!code) return;
    try {
      const res = await fetch('/api/v1/products/by-barcode/' + encodeURIComponent(code));
      if (!res.ok) throw new Error('Not found');
      const p = await res.json();
      const btn = document.querySelector('.pos-product-btn[data-id="' + p.id + '"]');
      if (btn) btn.click(); else {
        cart.push({ id: String(p.id), name: p.name, basePrice: p.price, price: p.price, quantity: 1, size: 'Medium', note: '' });
        render();
      }
      e.target.value = '';
    } catch { alert('Barcode not found'); }
  });
  checkoutBtn.addEventListener('click', async () => {
    checkoutBtn.disabled = true;
    const tableVal = document.getElementById('table-select').value;
    const payload = {
      items: cart.map(item => ({ productId: parseInt(item.id, 10), quantity: item.quantity, size: item.size, note: item.note || '', price: item.price })),
      customerId: parseInt(document.getElementById('customer-select').value, 10),
      couponCode: document.getElementById('pos-coupon').value.trim() || null,
      tableId: tableVal ? parseInt(tableVal, 10) : null
    };
    const res = await fetch('/admin/pos/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const data = await res.json();
    if (res.ok) { cart = []; render(); window.location.href = data.redirectUrl; }
    else { alert(data.message); checkoutBtn.disabled = false; }
  });
  render();
});
</script>
</body>
</html>
