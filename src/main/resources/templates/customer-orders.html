<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
  <div th:replace="~{fragments/order-header :: order-header}"></div>
  <main class="page">
    <div class="container" style="max-width:640px;">
      <h1 class="page-title">Order history</h1>
      <p class="page-subtitle">Track status of your in-shop and online orders.</p>

      <div th:if="${#lists.isEmpty(orders)}" class="empty-state mt-3">
        <h2>No orders yet</h2>
        <a href="/index#product-menu" class="btn btn-primary mt-2">Start ordering</a>
      </div>

      <div th:each="order : ${orders}" class="card mt-2">
        <div class="flex justify-between items-center flex-wrap gap-sm">
          <div>
            <strong th:text="'Order #' + ${order.id}"></strong>
            <p class="text-muted" style="margin:0.25rem 0 0;font-size:0.88rem;" th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy · HH:mm')}"></p>
          </div>
          <span class="badge"
                th:classappend="${order.status.name() == 'COMPLETED'} ? 'badge-completed' :
                                (${order.status.name() == 'PENDING'} ? 'badge-pending' :
                                (${order.status.name() == 'PREPARING'} ? 'badge-preparing' : 'badge-cancelled'))"
                th:text="${order.status}"></span>
        </div>
        <div class="mt-2" th:each="item : ${order.orderItems}" style="display:flex;gap:0.75rem;align-items:center;padding:0.5rem 0;border-top:1px solid var(--border);">
          <img th:src="${item.product.imageUrl}" style="width:56px;height:56px;border-radius:10px;object-fit:cover;" alt="">
          <div style="flex:1;">
            <strong th:text="${item.product.name}"></strong>
            <p class="text-muted" style="margin:0;font-size:0.85rem;">Qty <span th:text="${item.quantity}"></span></p>
          </div>
          <span th:text="'$' + ${#numbers.formatDecimal(item.priceAtTimeOfOrder * item.quantity, 1, 2)}"></span>
        </div>
        <div class="flex justify-between mt-2" style="font-weight:700;">
          <span>Total</span>
          <span th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span>
        </div>
        <a th:href="@{/customer/orders/{id}(id=${order.id})}" class="btn btn-outline btn-sm mt-2">Details</a>
      </div>
    </div>
  </main>
  <div th:replace="~{fragments/footer :: footer}"></div>
  <script src="/javascript/ui.js"></script>
</body>
</html>
