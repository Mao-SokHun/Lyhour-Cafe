services:
  - type: web
    name: lyhour-cafe
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /home
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: neon
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_STRIPE_ENABLED
        value: "false"
      - key: APP_STRIPE_SECRET_KEY
        sync: false
      - key: APP_STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_STRIPE_SUCCESS_URL
        sync: false
      - key: APP_STRIPE_CANCEL_URL
        sync: false
      - key: APP_TELEGRAM_ENABLED
        value: "true"
      - key: APP_TELEGRAM_BOT_TOKEN
        sync: false
      - key: APP_TELEGRAM_CHAT_ID
        sync: false
      - key: APP_KHQR_DEMO_MODE
        value: "true"
      - key: APP_BAKONG_ENABLED
        value: "true"
      - key: APP_KHQR_ENABLED
        value: "true"
      - key: APP_PUSH_ENABLED
        value: "false"
      - key: APP_BACKUP_ENABLED
        value: "true"
